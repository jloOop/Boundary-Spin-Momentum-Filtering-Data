name: Syntax check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  compile-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Compile Python files
        run: python -m compileall Loaders Solvers
